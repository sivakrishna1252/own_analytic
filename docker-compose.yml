version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8704
    volumes:
      - ./main_analytic:/app
    ports:
      - "8704:8704"
    env_file:
      - ./main_analytic/.env
    # Note: If the database is on the host, use 'host.docker.internal' or the VPS IP as DB_HOST in .env
    # And if on Linux, you might need extra_hosts to resolve host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
